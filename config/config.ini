[EXPERIMENT_PATH]
# 1600×1200の画像の入ったディレクトリ(README.mdのデータセットのフォルダ構成を参照)
img_path = ./Data/master_exp_data
# 結果を保存するディレクトリ
default_path = ./result/26_05_11/色度のみ

[EXPERIMENT_PARAM]
# 実験対象:
#   membrane / nuclear … 単独学習（bf,df,ph の RGB or HSV）。use_rgb_balance / use_rgb_chromatic で追加チャンネル可
#   membrane_balance / nuclear_balance … 上記と同じ正解だが、入力は RGB バランス画像のみ（各撮像法 3ch）。use_rgb_balance, use_rgb_chromatic は必ず False
#   both … 膜と核の同時学習
#   membrane+ / nuclear+ … 相手マスクを条件にした学習
experiment_subject = membrane_balance
# 使用するネットワーク(U-Net or U-Net++)
use_Network = U-Net
# Deep Supervisionを使用するか(True or False, U-Net++のみ)
deep_supervision = True
# 画像の色空間(RGB or HSV)
color = RGB
# ブレンドモード(concatenate or alpha)
blend = concatenate
# グラデーションを使用するか(True or False, membrane / membrane_balance / both / +系の膜側で有効)
gradation = True
# 考慮外核を学習するか(True or False, nuclear / nuclear_balance / both / +系の核側で有効)
train_dont_care = True
# 標準的核面積に対する考慮外核の面積の割合(0~100, 単位[%], nuclear / nuclear_balance / both / +系で有効)
care_rate = 75
# 標準的核面積の計算時に除外する面積下位割合(0~100, 単位[%], nuclear / nuclear_balance / both / +系で有効)
lower_ratio = 17
# 標準的核面積の計算時に除外する面積上位割合(0~100, 単位[%], nuclear / nuclear_balance / both / +系で有効)
higher_ratio = 0
# 損失関数(DiceLoss or BCELoss)
use_loss = DiceLoss
# 学習を開始するエポック数
start_num = 0
# エポック数
num_epochs = 20
# 学習率
lr = 5e-05
# バッチサイズ
batch_size = 32
# 1=撮像法を1系統ずつ / 3=bf・df・ph のオンオフ(concatenate 時は 2^3-1=7 パターン)。9/18 は色チャンネル単位の比較用
use_list_length = 3
# データ拡張の回数
data_augmentation_num = 500
# 学習画像のサイズ
train_size = (256, 256)
# 彩度の変化の範囲
saturation_mag = (0.7, 1.3)
# 明度の変化の範囲
value_mag = (0.7, 1.3)
# コントラストの変化の範囲
contrast_mag = (0.7, 1.3)
# 学習時の膨張の半径(膜ラベル側: membrane / membrane_balance / both / +系)
radius_train = 3
# 使用するデバイス(CUDAのナンバーのリスト)
use_device = [0,1]
# 自動混合精度を使用するか(True or False)
use_autocast = True
# 自動混合精度のデータ型(bfloat16 or float16)
autocast_dtype = bfloat16
# 画像の圧縮率(1で圧縮なし, 同一画素値の圧縮幅)
compress_rate = 1
# エラーを無視するか(True or False)
ignore_error = False
# membrane / nuclear のみ: 元 RGB(HSV)に RGB バランス 3ch を連結するか。membrane_balance / nuclear_balance では False 固定
use_rgb_balance = False
# membrane / nuclear のみ: 元画像に色差(chromatic diff) 3ch を連結するか。membrane_balance / nuclear_balance では False 固定
use_rgb_chromatic = False

[EVALIATION_PARAM]
# 出力は eval_data_membrane / eval_data_nuclear から読みます（membrane_balance / nuclear_balance も同じフォルダ名です）
# 評価時の膨張の半径(膜系: membrane / membrane_balance / both / +系)
radius_eval = 3
# 細胞膜の評価を開始するEpoch(膜系が対象のとき)
membrane_sparse_epoch_start = 1
# 細胞膜の評価を行うEpochのステップ(membrane or bothの場合のみ)
membrane_sparse_epoch_step = 5
# 細胞膜の評価の二値化閾値の最小値(membrane or bothの場合のみ)
membrane_sparse_threshold_min = 127
# 細胞膜の評価の二値化閾値の最大値(membrane or bothの場合のみ)
membrane_sparse_threshold_max = 255
# 細胞膜の評価の閾値のステップ(membrane or bothの場合のみ)
membrane_sparse_threshold_step = 5
# 細胞膜の評価の小領域削除面積の最小値(membrane or bothの場合のみ)
membrane_sparse_del_area_min = 0
# 細胞膜の評価の小領域削除面積の最大値(membrane or bothの場合のみ)
membrane_sparse_del_area_max = 100
# 細胞膜の評価の小領域削除面積のステップ(membrane or bothの場合のみ)
membrane_sparse_del_area_step = 5
# 細胞核の評価モード(nuclear or bothの場合のみ)
nuclear_eval_mode = inclusion
# 細胞核の評価距離(nuclear or bothの場合かつnuclear_eval_modeがproximityの場合のみ)
nuclear_eval_distance = 5
# 細胞核の評価を開始するEpoch(nuclear or bothの場合のみ)
nuclear_sparse_epoch_start = 1
# 細胞核の評価を行うEpochのステップ(nuclear or bothの場合のみ)
nuclear_sparse_epoch_step = 5
# 細胞核の評価の二値化閾値の最小値(nuclear or bothの場合のみ)
nuclear_sparse_threshold_min = 127
# 細胞核の評価の二値化閾値の最大値(nuclear or bothの場合のみ)
nuclear_sparse_threshold_max = 255
# 細胞核の評価の閾値のステップ(nuclear or bothの場合のみ)
nuclear_sparse_threshold_step = 5
# 細胞核の評価の小領域削除面積の最小値(nuclear or bothの場合のみ)
nuclear_sparse_del_area_min = 0
# 細胞核の評価の小領域削除面積の最大値(nuclear or bothの場合のみ)
nuclear_sparse_del_area_max = None
# 細胞核の評価の小領域削除面積のステップ(nuclear or bothの場合のみ)
nuclear_sparse_del_area_step = 5
